name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # change to master if that's your default branch

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Firebase config
        run: |
          sed -i 's|YOUR_API_KEY|${{ secrets.FIREBASE_API_KEY }}|g' index.html
          sed -i 's|YOUR_PROJECT.firebaseapp.com|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g' index.html
          sed -i 's|https://YOUR_PROJECT-default-rtdb.firebaseio.com|${{ secrets.FIREBASE_DATABASE_URL }}|g' index.html
          sed -i 's|YOUR_PROJECT.firebasestorage.app|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g' index.html
          sed -i 's|YOUR_PROJECT|${{ secrets.FIREBASE_PROJECT_ID }}|g' index.html
          sed -i 's|YOUR_SENDER_ID|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g' index.html
          sed -i 's|YOUR_APP_ID|${{ secrets.FIREBASE_APP_ID }}|g' index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
